<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            background: url('https://picsum.photos/1920/1080') no-repeat center/cover;
            height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            overflow: hidden;
        }

        .tabs-bar {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            gap: 6px;
            user-select: none;
        }

        /* ТАБ: Высота и скругление как у кнопки + */
        .tab {
            display: flex;
            align-items: center;
            background-color: #2d2d2d;
            color: #ffffff;
            
            /* Высота в точности как у кнопки + */
            height: 26px; 
            padding: 0 12px;
            
            /* Скругление как у кнопки + */
            border-radius: 7px; 
            
            font-size: 13px;
            font-weight: 600;
            letter-spacing: -0.2px;
            gap: 10px;
            cursor: pointer;
            box-sizing: border-box;
        }

        .close-icon {
            color: #858585;
            font-size: 14px;
            line-height: 1;
            display: flex;
            align-items: center;
        }

        /* КНОПКА ПЛЮС */
        .plus-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #1e1e1e;
            color: #858585;
            
            width: 26px;
            height: 26px;
            border-radius: 7px;
            
            font-size: 18px;
            cursor: pointer;
            box-sizing: border-box;
        }

        #editor-container {
            flex: 1;
        }

        /* Прозрачность Monaco */
        .monaco-editor, .monaco-editor-background, .monaco-editor .margin {
            background-color: transparent !important;
        }
    </style>
</head>
<body>

    <div class="tabs-bar" id="tabsBar">
        <div class="plus-btn" id="addBtn">+</div>
    </div>

    <div id="editor-container"></div>

    <script src="https://unpkg.com/monaco-editor@0.45.0/min/vs/loader.js"></script>
    <script>
        let editor;
        let tabs = [{ id: 1, name: 'Tab', content: '' }];
        let activeTabId = 1;

        require.config({ paths: { vs: 'https://unpkg.com/monaco-editor@0.45.0/min/vs' }});
        require(['vs/editor/editor.main'], function () {
            monaco.editor.defineTheme('transparent-theme', {
                base: 'vs-dark',
                inherit: true,
                rules: [],
                colors: {
                    'editor.background': '#00000000',
                    'editorGutter.background': '#00000000',
                    'editor.lineHighlightBackground': '#00000000',
                }
            });

            editor = monaco.editor.create(document.getElementById('editor-container'), {
                value: tabs[0].content,
                language: 'javascript',
                theme: 'transparent-theme',
                automaticLayout: true,
                minimap: { enabled: false },
                renderLineHighlight: 'none',
                fontSize: 15
            });
            renderTabs();
        });

        function renderTabs() {
            const bar = document.getElementById('tabsBar');
            const addBtn = document.getElementById('addBtn');
            bar.querySelectorAll('.tab').forEach(t => t.remove());

            tabs.forEach(tab => {
                const tabEl = document.createElement('div');
                tabEl.className = 'tab';
                tabEl.innerHTML = `<span>${tab.name}</span><span class="close-icon">✕</span>`;
                
                tabEl.onclick = () => switchTab(tab.id);
                tabEl.querySelector('.close-icon').onclick = (e) => {
                    e.stopPropagation();
                    closeTab(tab.id);
                };
                bar.insertBefore(tabEl, addBtn);
            });
        }

        function switchTab(id) {
            const currentTab = tabs.find(t => t.id === activeTabId);
            if (currentTab) currentTab.content = editor.getValue();
            activeTabId = id;
            editor.setValue(tabs.find(t => t.id === id).content);
            renderTabs();
        }

        function closeTab(id) {
            if (tabs.length === 1) return;
            tabs = tabs.filter(t => t.id !== id);
            if (activeTabId === id) activeTabId = tabs[0].id;
            editor.setValue(tabs.find(t => t.id === activeTabId).content);
            renderTabs();
        }

        document.getElementById('addBtn').onclick = function() {
            const newId = Date.now();
            tabs.push({ id: newId, name: 'Tab', content: '' });
            switchTab(newId);
        };
    </script>
</body>
</html>
