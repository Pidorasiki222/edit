<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultra Transparent Monaco</title>

<style>
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: url('https://picsum.photos/1920/1080') no-repeat center/cover;
        overflow: hidden;
    }

    #editor {
        position: fixed;
        inset: 0;
    }

    /* ☠️ УБИВАЕМ ВСЕ ФОНЫ */
    .monaco-editor,
    .monaco-editor-background,
    .monaco-editor .margin,
    .monaco-editor .inputarea.ime-input,
    .monaco-editor .minimap,
    .monaco-editor .decorationsOverviewRuler,
    .monaco-editor .scroll-decoration {
        background: transparent !important;
    }

    /* убираем текущую строку */
    .monaco-editor .current-line {
        background: transparent !important;
    }

    /* убираем выделение строки */
    .monaco-editor .lineHighlight {
        background: transparent !important;
    }

    /* курсор оставляем */
    .monaco-editor .cursor {
        background: #ffffff !important;
    }

    /* выделение текста (чтобы хоть что-то видно было) */
    .monaco-editor .selected-text {
        background: rgba(255,255,255,0.2) !important;
    }

    /* скрываем gutter (номера строк фон) */
    .monaco-editor .margin {
        opacity: 0.3;
    }
</style>
</head>

<body>
<div id="editor"></div>

<script src="https://unpkg.com/monaco-editor@0.45.0/min/vs/loader.js"></script>
<script>
require.config({
    paths: { vs: 'https://unpkg.com/monaco-editor@0.45.0/min/vs' }
});

require(['vs/editor/editor.main'], function () {

    monaco.editor.defineTheme('transparent-theme', {
        base: 'vs-dark',
        inherit: true,
        rules: [
            { token: '', background: '00000000' } // 💀 прозрачный фон
        ],
        colors: {
            'editor.background': '#00000000',
            'editorGutter.background': '#00000000',
            'editorLineNumber.foreground': '#aaaaaa',
            'editorCursor.foreground': '#ffffff',
            'editor.selectionBackground': '#ffffff33',
            'editor.lineHighlightBackground': '#00000000'
        }
    });

    monaco.editor.create(document.getElementById('editor'), {
        value: `// full transparent mode 😎
function vibe() {
    console.log("no background, only code");
}`,
        language: 'javascript',
        theme: 'transparent-theme',

        automaticLayout: true,
        fontSize: 16,

        /* 💀 убираем всё лишнее */
        minimap: { enabled: false },
        glyphMargin: false,
        folding: false,
        lineNumbersMinChars: 3,

        renderLineHighlight: 'none',
        overviewRulerBorder: false,
        hideCursorInOverviewRuler: true
    });
});
</script>

</body>
</html>
