<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
html, body {
    margin: 0;
    height: 100%;
    background: url('https://picsum.photos/1920/1080') center/cover;
}

/* 🔝 TAB BAR */
#tabs {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 40px;
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 5px;
    backdrop-filter: blur(10px);
    z-index: 10;
}

.tab {
    padding: 5px 10px;
    background: rgba(0,0,0,0.4);
    border-radius: 6px;
    color: white;
    cursor: pointer;
    font-family: monospace;
}

.tab.active {
    background: rgba(255,255,255,0.2);
}

.close {
    margin-left: 5px;
    color: red;
    cursor: pointer;
}

#add {
    margin-left: auto;
    cursor: pointer;
    color: white;
}

/* 🖥 EDITOR */
#editor {
    position: fixed;
    top: 40px;
    bottom: 0;
    left: 0;
    right: 0;
}

/* ☠️ ЖЁСТКИЙ OVERRIDE ПРОЗРАЧНОСТИ */
.monaco-editor,
.monaco-editor-background,
.monaco-editor .margin,
.monaco-editor .inputarea,
.monaco-editor .minimap,
.monaco-editor .decorationsOverviewRuler {
    background: transparent !important;
}

/* убираем текущую строку */
.monaco-editor .current-line,
.monaco-editor .view-overlays {
    background: transparent !important;
}
</style>
</head>

<body>

<div id="tabs"></div>
<div id="editor"></div>

<script src="https://unpkg.com/monaco-editor@0.45.0/min/vs/loader.js"></script>
<script>
require.config({ paths: { vs: 'https://unpkg.com/monaco-editor@0.45.0/min/vs' } });

require(['vs/editor/editor.main'], function () {

    // 🎨 прозрачная тема (ВАЖНО)
    monaco.editor.defineTheme('transparent', {
        base: 'vs-dark',
        inherit: true,
        rules: [],
        colors: {
            'editor.background': '#00000000',
            'editorGutter.background': '#00000000',
            'editorLineNumber.foreground': '#aaaaaa',
            'editor.lineHighlightBackground': '#00000000'
        }
    });

    const editor = monaco.editor.create(document.getElementById('editor'), {
        value: '',
        language: 'javascript',
        theme: 'transparent',
        automaticLayout: true,
        minimap: { enabled: false },
        renderLineHighlight: 'none'
    });

    let tabs = [];
    let current = null;
    let id = 0;

    function addTab() {
        let model = monaco.editor.createModel("// new file", "javascript");

        let tab = { id: id++, name: "file" + id + ".js", model };
        tabs.push(tab);

        switchTab(tab.id);
        drawTabs();
    }

    function switchTab(tabId) {
        let tab = tabs.find(t => t.id === tabId);
        if (!tab) return;

        current = tab;
        editor.setModel(tab.model);
        drawTabs();
    }

    function closeTab(tabId) {
        let i = tabs.findIndex(t => t.id === tabId);
        if (i === -1) return;

        tabs[i].model.dispose();
        tabs.splice(i, 1);

        if (tabs.length) {
            switchTab(tabs[0].id);
        } else {
            editor.setModel(null);
        }

        drawTabs();
    }

    function renameTab(tabId) {
        let tab = tabs.find(t => t.id === tabId);
        let name = prompt("rename:", tab.name);
        if (name) tab.name = name;
        drawTabs();
    }

    function drawTabs() {
        let el = document.getElementById('tabs');
        el.innerHTML = '';

        tabs.forEach(t => {
            let tab = document.createElement('div');
            tab.className = 'tab' + (t === current ? ' active' : '');
            tab.textContent = t.name;

            tab.onclick = () => switchTab(t.id);
            tab.ondblclick = () => renameTab(t.id);

            let close = document.createElement('span');
            close.textContent = ' ×';
            close.className = 'close';

            close.onclick = (e) => {
                e.stopPropagation();
                closeTab(t.id);
            };

            tab.appendChild(close);
            el.appendChild(tab);
        });

        let add = document.createElement('div');
        add.id = 'add';
        add.textContent = '+';
        add.onclick = addTab;

        el.appendChild(add);
    }

    // 🚀 старт
    addTab();
});
</script>

</body>
</html>
