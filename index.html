<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html;charset=utf-8" />
    <style>
        html, body, #container { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
    </style>
</head>
<body>
    <div id="container"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    <script>
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' }});
        var editor;
        require(['vs/editor/editor.main'], function() {
            editor = monaco.editor.create(document.getElementById('container'), {
                value: '// Welcome to Nexusware\n',
                language: 'lua', // Ставим Lua по умолчанию
                theme: 'vs-dark', // Темная тема
                automaticLayout: true,
                fontSize: 14,
                fontFamily: 'Consolas',
                minimap: { enabled: true },
                roundedSelection: true,
                scrollbar: {
                    vertical: 'visible',
                    horizontal: 'visible',
                    useShadows: false,
                    verticalHasArrows: false,
                    horizontalHasArrows: false,
                    verticalScrollbarSize: 10,
                    horizontalScrollbarSize: 10
                }
            });
        });

        // Функция для получения текста из C#
        function getText() { return editor.getValue(); }
        // Функция для установки текста из C#
        function setText(text) { editor.setValue(text); }
    </script>
</body>
</html>
