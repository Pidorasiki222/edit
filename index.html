<!DOCTYPE html>
<html>
<head>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: transparent; }
        #container { width: 100%; height: 100%; background: transparent; }
        /* Делаем Monaco прозрачным */
        .monaco-editor, .monaco-editor-background, .monaco-editor .inputarea.ime-input {
            background-color: rgba(15, 15, 15, 0.7) !important;
        }
    </style>
</head>
<body>
    <div id="container"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>
    <script>
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs' }});
        let editor;
        require(['vs/editor/editor.main'], function() {
            editor = monaco.editor.create(document.getElementById('container'), {
                value: "// Energy Editor Loaded",
                language: 'javascript',
                theme: 'vs-dark',
                transparentBackground: true,
                automaticLayout: true,
                fontFamily: "Cascadia Code, Consolas",
                fontSize: 14,
                minimap: { enabled: false }
            });
        });

        function setText(text) {
            editor.setValue(text);
        }
    </script>
</body>
</html>
